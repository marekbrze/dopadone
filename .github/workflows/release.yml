name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unlock macOS Keychain
        env:
          MAC_PASSWORD: ${{ secrets.MAC_MINI_PASSWORD }}
        run: |
          security unlock-keychain -p "$MAC_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MAC_PASSWORD" ~/Library/Keychains/login.keychain-db

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Install GoReleaser
        run: |
          if ! command -v goreleaser &> /dev/null; then
            brew install goreleaser/tap/goreleaser
          fi

      - name: Build Linux AMD64 in Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "/tmp:/tmp" \
            -w /workspace \
            -e CGO_ENABLED=1 \
            -e CC=gcc \
            golang:1.25-bookworm \
            go build -trimpath -ldflags "-s -w \
              -X github.com/marekbrze/dopadone/internal/version.Version=${{ github.ref_name }} \
              -X github.com/marekbrze/dopadone/internal/version.GitCommit=$(git rev-parse HEAD) \
              -X github.com/marekbrze/dopadone/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o /tmp/dopa ./cmd/dopa

      - name: Create Linux archive
        run: |
          cd /tmp
          tar -czvf dopadone-linux-amd64.tar.gz dopa
          shasum -a 256 dopadone-linux-amd64.tar.gz > dopadone-linux-amd64.tar.gz.sha256

      - name: Build Windows AMD64
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags "-s -w \
            -X github.com/marekbrze/dopadone/internal/version.Version=${{ github.ref_name }} \
            -X github.com/marekbrze/dopadone/internal/version.GitCommit=$(git rev-parse HEAD) \
            -X github.com/marekbrze/dopadone/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o /tmp/dopa.exe ./cmd/dopa

      - name: Create Windows archive
        run: |
          cd /tmp
          zip dopadone-windows-amd64.zip dopa.exe
          shasum -a 256 dopadone-windows-amd64.zip > dopadone-windows-amd64.zip.sha256

      - name: Build macOS AMD64 (Intel)
        env:
          CGO_ENABLED: 0
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -trimpath -ldflags "-s -w \
            -X github.com/marekbrze/dopadone/internal/version.Version=${{ github.ref_name }} \
            -X github.com/marekbrze/dopadone/internal/version.GitCommit=$(git rev-parse HEAD) \
            -X github.com/marekbrze/dopadone/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o /tmp/dopa-darwin-amd64 ./cmd/dopa

      - name: Create macOS AMD64 archive
        run: |
          cp /tmp/dopa-darwin-amd64 /tmp/dopa
          cd /tmp
          tar -czvf dopadone-darwin-amd64.tar.gz dopa
          shasum -a 256 dopadone-darwin-amd64.tar.gz > dopadone-darwin-amd64.tar.gz.sha256
          rm -f dopa

      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GORELEASER_PAT }}

      - name: Upload archives to release
        env:
          GH_TOKEN: ${{ secrets.MY_GORELEASER_PAT }}
        run: |
          gh release upload ${{ github.ref_name }} /tmp/dopadone-linux-amd64.tar.gz /tmp/dopadone-darwin-amd64.tar.gz /tmp/dopadone-windows-amd64.zip --clobber
