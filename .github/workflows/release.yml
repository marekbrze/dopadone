name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unlock macOS Keychain
        env:
          MAC_PASSWORD: ${{ secrets.MAC_MINI_PASSWORD }}
        run: |
          security unlock-keychain -p "$MAC_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MAC_PASSWORD" ~/Library/Keychains/login.keychain-db

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Install GoReleaser
        run: |
          if ! command -v goreleaser &> /dev/null; then
            brew install goreleaser/tap/goreleaser
          fi

      - name: Build Linux AMD64 in Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "/tmp:/tmp" \
            -w /workspace \
            -e CGO_ENABLED=1 \
            -e CC=gcc \
            golang:1.25-bookworm \
            go build -trimpath -ldflags "-s -w \
              -X github.com/marekbrze/dopadone/internal/version.Version=${{ github.ref_name }} \
              -X github.com/marekbrze/dopadone/internal/version.GitCommit=$(git rev-parse HEAD) \
              -X github.com/marekbrze/dopadone/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o /tmp/dopa ./cmd/dopa

      - name: Create Linux archive
        run: |
          cd /tmp
          tar -czvf dopadone-linux-amd64.tar.gz dopa
          shasum -a 256 dopadone-linux-amd64.tar.gz > dopadone-linux-amd64.tar.gz.sha256

      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GORELEASER_PAT }}

      - name: Upload Linux archive to release
        env:
          GH_TOKEN: ${{ secrets.MY_GORELEASER_PAT }}
        run: |
          gh release upload ${{ github.ref_name }} /tmp/dopadone-linux-amd64.tar.gz --clobber
