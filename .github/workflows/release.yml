name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            ext: ""
          - os: darwin
            arch: arm64
            runner: ubuntu-latest
            ext: ""
          - os: windows
            arch: amd64
            runner: windows-latest
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      # Test text

      - name: Get version info
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -trimpath \
            -ldflags "-s -w \
              -X github.com/marekbrze/dopadone/internal/version.Version=${{ steps.version.outputs.version }} \
              -X github.com/marekbrze/dopadone/internal/version.GitCommit=${{ steps.version.outputs.git_commit }} \
              -X github.com/marekbrze/dopadone/internal/version.BuildDate=${{ steps.version.outputs.build_date }}" \
            -o "dopa-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}" \
            ./cmd/dopa

      - name: Create archive (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          tar -czvf "dopa-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
            "dopa-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"

      - name: Create archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dopa-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}" `
            -DestinationPath "dopa-${{ matrix.os }}-${{ matrix.arch }}.zip"

      - name: Generate SHA256 checksum (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "darwin" ]; then
            shasum -a 256 "dopa-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" > "dopa-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256"
          else
            sha256sum "dopa-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" > "dopa-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256"
          fi

      - name: Generate SHA256 checksum (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "dopa-${{ matrix.os }}-${{ matrix.arch }}.zip").Hash.ToLower()
          "$hash  dopa-${{ matrix.os }}-${{ matrix.arch }}.zip" | Out-File -Encoding ASCII "dopa-${{ matrix.os }}-${{ matrix.arch }}.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dopa-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dopa-${{ matrix.os }}-${{ matrix.arch }}.*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release-assets/ \;
          ls -lah release-assets/

      - name: Get version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if this is a pre-release (contains hyphen)
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
