version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - goconst
    - gocyclo
    - dupl
  settings:
    gocyclo:
      min-complexity: 20
    goconst:
      min-len: 3
      min-occurrences: 3
    dupl:
      threshold: 150
  exclusions:
    paths:
      - vendor
      - testdata
    rules:
      - path: _test\.go
        linters:
          - dupl
          - goconst

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
