version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - goconst
    - gocyclo
    - dupl
  settings:
    gocyclo:
      min-complexity: 30
    goconst:
      min-len: 3
      min-occurrences: 3
    dupl:
      threshold: 200
  exclusions:
    paths:
      - vendor
      - testdata
    rules:
      - path: _test\.go
        linters:
          - dupl
          - goconst
          - gocyclo
      - path: internal/version/version.go
        linters:
          - errcheck
      - path: cmd/dopa/(areas|projects|subareas|tasks).go
        linters:
          - errcheck
        text: 'defer.*| statements should have their error checked'
      - path: internal/cli/output/formatter.go
        linters:
          - errcheck
      - path: internal/tui/navigator.go
        linters:
          - dupl

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m
