version: "2"
sql:
  - engine: "sqlite"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - column: "areas.deleted_at"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "subareas.deleted_at"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "projects.deadline"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "projects.completed_at"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "projects.deleted_at"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "tasks.start_date"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "tasks.deadline"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "tasks.deleted_at"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
